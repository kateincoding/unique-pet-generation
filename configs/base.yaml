data:
  root: "./data/celeba"
  image_size: 224
  batch_size: 64
  num_workers: 4
  selected_attributes:
    - "Black_Hair"
    - "Blond_Hair"
    - "Brown_Hair"
    - "Gray_Hair"
    - "Straight_Hair"
    - "Wavy_Hair"
    - "Arched_Eyebrows"
    - "Bushy_Eyebrows"
    - "Narrow_Eyes"
    - "Big_Nose"
    - "Pointy_Nose"
    - "High_Cheekbones"
    - "Oval_Face"
    - "Pale_Skin"
    - "Chubby"

model:
  backbone: "resnet18"
  pretrained: true
  embedding_dim: 256
  dropout: 0.3
  freeze_backbone_epochs: 5

training:
  epochs: 30
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 2
  early_stopping_patience: 5
  checkpoint_dir: "./checkpoints"
  gradient_clip_norm: 1.0
  use_amp: true
